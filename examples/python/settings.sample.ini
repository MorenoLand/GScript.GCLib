# Generic settings file for examples/python/connect_from_headless_config.py.
# Copy this to settings.ini or pass it with --settings.

# Target server endpoint.
server.ip=127.0.0.1
server.port=14720

# Optional stable identity seed used by the example wrapper to derive
# deterministic client-info fields. Leave blank to derive from local host data.
login.pcidhashes=

# Optional private key/certificate material for encrypted Gen6 sessions.
# Keep real keys in an untracked settings.ini or pass them from your own wrapper.
# security.private_key_server_to_client=-----BEGIN PRIVATE KEY-----
# ...
# -----END PRIVATE KEY-----
